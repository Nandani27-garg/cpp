<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List in html</title>
</head>
<body>
    <ul>
        <li>bread</li>
        <li>butter</li>
        <li>Jam</li>
        <li>milk</li>
    </ul>

    <ol>
        <li>bread</li>
        <li>butter</li>
        <li>Jam</li>
        <li>milk</li>
    </ol>

    <ul type="circle">
        <li>bread</li>
        <li>butter</li>
        <li>Jam</li>
        <li>milk</li>
    </ul>

    <ol type="I">
        <li>bread</li>
        <li>butter</li>
        <li>Jam</li>
        <li>milk</li>
    </ol>
</body>
</html>
