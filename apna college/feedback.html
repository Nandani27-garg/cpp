<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>feedback form</title>
</head>

<body>
    <h3>Feedback Form</h3>
    <form action="/action">
        <div>
            <label for="user">Name:</label>
            <input type="text" id="user" name="user" placeholder="Write your name">
        </div>
        <br>
        <div>
            <label for="mail">Email:</label>
            <input type="text" id="mail" name="mail" placeholder="Write your email">
        </div>
        <br>
        <div>
            <label for="msg">Message:</label>
            <textarea id="msg" name="msg" placeholder="Write your message"></textarea>
        </div>
        <br>
        <div>
            <label for="rating">Rate us our of 5:</label>
            <br>
            <input type="radio" id="rate" name="rating" value="1">
            <label for="rate">1</label>
            <br>
            <input type="radio" id="rate" name="rating" value="2">
            <label for="rate">2</label>
            <br>
            <input type="radio" id="rate" name="rating" value="3">
            <label for="rate">3</label>
            <br>
            <input type="radio" id="rate" name="rating" value="4">
            <label for="rate">4</label>
            <br>
            <input type="radio" id="rate" name="rating" value="5">
            <label for="rate">5</label>
        </div>
        <br>
        <button>send your message!</button>
    </form>

</body>

</html>
