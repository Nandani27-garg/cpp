<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert</title>
    <link rel="stylesheet" href="alert.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    
</head>
<body>
    <!-- alert use for pop up message -->
     <!-- alert-success use for background green color -->
    <div class="alert alert-success">A simle success alert-cheak it out! </div>
    <br>
    <!-- btn-close use for close button symbol -->
     <!-- alert-dismissible use for add extra padding to the right of the alert to make space for the close button. -->
      <!-- data-bs-dismiss="alert" use for close the alert when we click on close button by java script that is we already include bootstrap js file at the bottom of the body tag --> -->
    <div class="alert alert-success alert-dismissible ">Coungratulations!
        <button class = "btn-close" data-bs-dismiss ="alert" ></button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
