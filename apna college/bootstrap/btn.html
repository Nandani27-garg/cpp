<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>button</title>
    <link rel="stylesheet" href="btn.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    
</head>
<body>
    <!-- we can use bootstrap button class to create buttons with different styles and sizes. -->
     <!-- and also we can use outline buttons and disabled buttons. --> 
      <!-- and also we can change the size of the button using btn-sm and btn-lg classes. --> 
       <!-- also we can use different colors for the buttons using btn-primary, btn-secondary, btn-success,danger, btn-warning, btn-info, btn-light, btn-dark classes. --> 
        <!-- also we can change btn properties using custom css file. --> 
    <div class="btn btn-primary btn-sm ">click me</div>
    <div class="btn btn-secondary btn-lg">click me</div>
    <div class="btn btn-outline-success">click me</div>
    <div class="btn btn-dan btn-ger">click me</div>
    <div class="btn btn-warning">click me</div>
    <div class="btn btn-info">click me</div>
    <div class="btn btn-light">click me</div>
    <div class="btn btn-dark disabled">click me</div>
    <a href="https://google.com" class="btn btn-dark outline btn-lg">google me</a>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
