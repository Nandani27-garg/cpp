<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bedge</title>
    <link rel="stylesheet" href="bedge.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    
</head>
<body>
    <!-- badge means some label or tag to highlight new or important information. -->
     <!-- bg-secondory means background color of the badge is secondary color defined in bootstrap.  -->
    <h1>Notification<span class="badge bg-secondary">20+</span></h1>
    <!-- we can use badge component to show notification count or any important information. -->
     <br>
     <div>
     <button class="btn btn-danger outline rounded-pill">Followers <span class="badge bg-secondary">10+</span></button>
     </div>
     <!-- we can also use badge inside button to show count of followers or any other information. -->
      <!-- in it rounded-pill class is used to make the button edges rounded like a pill shape. -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</body>
</html>
